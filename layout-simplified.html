<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zudoku — Glassmorphism</title>
    
    <!-- PWA Integration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="public/192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=86">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           DESIGN TOKENS
        ======================================== */
        :root {
            --bg:          #222222;
            --text:        #A4A4A4;
            --inactive:    #4D4D4D;
            --grid-line:   #333333;
            --highlight:   #57C7FF;
            --glow:        rgba(87, 199, 255, 0.6);
            --crosshair:   #2a2a2a;
            --font:        'Avenir Next', 'Avenir', 'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif;
        }

        [data-theme="light"] {
            --bg:          #e0e0e0;
            --text:        #555555;
            --inactive:    #999999;
            --grid-line:   #CCCCCC;
            --highlight:   #007AFF;
            --glow:        rgba(0, 122, 255, 0.4);
            --crosshair:   #d8d8d8;
        }

        /* ========================================
           RESET & BASE
        ======================================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            /* Technical Grid Pattern (Ultra-Fine 4X) */
            background-image: 
                linear-gradient(rgba(87, 199, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(87, 199, 255, 0.1) 1px, transparent 1px);
            background-size: 10px 10px;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'JetBrains Mono', 'Satoshi', 'Inter', -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* ========================================
           OUTER SHELL — full-height column
        ======================================== */
        .shell {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        /* ========================================
           NUMBER INPUT BAR
        ======================================== */
        .input-number-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 8px 0 8px;
            width: 100%;
            max-width: 750px; /* Expanded for larger buttons */
            margin: 0 auto;
        }



        .num-btn {
            flex: 1;
            height: 60px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 30px;
            font-weight: 300;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: color 0.15s, background 0.15s;
            touch-action: manipulation;
        }
        .num-btn:hover { color: var(--highlight); background: rgba(87,199,255,0.06); }
        .num-btn.selected {
            color: var(--highlight);
            background: rgba(87,199,255,0.12);
            font-weight: 600;
        }
        .num-btn.completed { opacity: 0.1; pointer-events: none; scale: 0.8; }

        /* ========================================
           SUDOKU GRID AREA
        ======================================== */
        .grid-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            min-height: 0;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(0, 1fr));
            grid-template-rows: repeat(9, minmax(0, 1fr));
            background: var(--grid-line);
            gap: 2px; /* Snapped to integer for crisp rendering */
            width: min(calc(100vw - 16px), calc(100vh - 180px));
            height: min(calc(100vw - 16px), calc(100vh - 180px));
            border: 2px solid var(--grid-line);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        /* 3x3 Subgrid Boundaries (Pseudo-layer to avoid shadow collision) */
        .cell::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1;
            transition: box-shadow 0.1s;
            border-radius: inherit;
        }

        /* Highly distinct 3x3 subgrid boundaries using inset shadow */
        .cell:nth-child(3n):not(:nth-child(9n))::before { box-shadow: inset -3px 0 0 -1px rgba(255,255,255,0.15); }
        .cell:nth-child(n+19):nth-child(-n+27)::before,
        .cell:nth-child(n+46):nth-child(-n+54)::before { box-shadow: inset 0 -3px 0 -1px rgba(255,255,255,0.15); }

        /* Handle intersections (corner of 3x3 blocks) */
        .cell:nth-child(21)::before, .cell:nth-child(24)::before,
        .cell:nth-child(48)::before, .cell:nth-child(51)::before { 
            box-shadow: inset -3px -3px 0 -1px rgba(255,255,255,0.15) !important; 
        }

        [data-theme="light"] .cell:nth-child(3n):not(:nth-child(9n))::before { box-shadow: inset -3px 0 0 -1px rgba(0,0,0,0.1); }
        [data-theme="light"] .cell:nth-child(n+19):nth-child(-n+27)::before,
        [data-theme="light"] .cell:nth-child(n+46):nth-child(-n+54)::before { box-shadow: inset 0 -3px 0 -1px rgba(0,0,0,0.1); }
        [data-theme="light"] .cell:nth-child(21)::before, [data-theme="light"] .cell:nth-child(24)::before,
        [data-theme="light"] .cell:nth-child(48)::before, [data-theme="light"] .cell:nth-child(51)::before { 
            box-shadow: inset -3px -3px 0 -1px rgba(0,0,0,0.1) !important; 
        }

        .cell {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font);
            font-size: clamp(24px, 6vw, 44px);
            font-weight: 300;
            color: var(--text);
            cursor: pointer;
            position: relative;
            transition: background 0.1s, color 0.1s;
        }
        .cell:hover { background: #080808; }
        
        .cell.given {
            font-weight: 600;
            color: #E0E0E0;
            background: #2d2d2d !important; /* Slightly lighter/more distinct in dark mode */
        }

        .cell.selected {
            background: rgba(87, 199, 255, 0.25) !important;
            box-shadow: inset 0 0 0 2px var(--highlight), 0 0 25px var(--glow) !important;
            border-radius: 6px;
            z-index: 10;
        }

        .cell.highlighted { background: var(--crosshair); }
        
        /* Crosshair highlights */
        .cell.row-highlight, .cell.col-highlight { 
            background: var(--crosshair) !important; 
        }

        /* Rounded Outer Glow for high-vis highlights */
        .cell.same-number-highlight { 
            color: var(--highlight) !important;
            text-shadow: 0 0 8px var(--glow);
            box-shadow: inset 0 0 0 1.5px var(--highlight), 0 0 12px var(--glow) !important;
            border-radius: 6px;
            background: rgba(87, 199, 255, 0.1);
            z-index: 5;
        }
        
        .cell.number-selected { 
            background: rgba(87,199,255,0.08) !important; 
        }
        .cell.note-selected { background: rgba(87,199,255,0.04) !important; }



        /* Intense Visual Vibration (Shake) */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, -2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, -2px); }
            70% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, 2px); }
            90% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        .cell.shake { 
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
            background: rgba(255, 60, 60, 0.25) !important;
            box-shadow: inset 0 0 0 2px #ff3c3c, 0 0 20px rgba(255, 60, 60, 0.4) !important;
            z-index: 20;
        }

        @keyframes celebration {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.08); }
            70% { transform: scale(0.96); }
        }
        .cell.celebrate {
            animation: celebration 0.5s ease-in-out;
            background: rgba(87, 199, 255, 0.2) !important;
        }

        /* Notes layout */
        .cell.notes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
            padding: 2px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .cell.notes .note-number {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, 1.5vw, 20px);
            color: var(--highlight);
            font-weight: 900;
            background: transparent;
            aspect-ratio: 1 / 1;
            transition: all 0.2s ease;
            line-height: 1;
        }
        
        [data-theme="light"] .cell.notes .note-number {
             background: rgba(0, 122, 255, 0.18); /* More opaque for visibility */
             color: #0056b3; /* Deeper blue for high-contrast on light background */
        }

        .cell.notes .note-number:empty { background: transparent; }

        .note-number-highlight {
            background: var(--highlight) !important;
            color: #111111 !important; /* Dark text on cyan for better contrast in dark theme */
            box-shadow: 0 0 8px var(--glow);
            border-radius: 2px;
        }

        /* Number complete */
        .cell.number-complete { opacity: 0.25; }

        /* Paint target */
        .cell.paint-target {
            background: rgba(87,199,255,0.06);
        }

        /* Cursor: number placed */
        @keyframes numberPlace {
            0% { opacity: 0; transform: scale(0.7); }
            60% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .cell.number-place-animation { animation: numberPlace 0.2s ease-out; }

        /* Completion Pulse Animation */
        @keyframes pulseSuccess {
            0% { transform: scale(1); background: var(--bg); box-shadow: 0 0 0 transparent; }
            30% { transform: scale(1.04); background: rgba(87, 199, 255, 0.35); box-shadow: 0 0 35px var(--glow); z-index: 50; }
            100% { transform: scale(1); background: var(--bg); box-shadow: 0 0 0 transparent; }
        }
        .cell.celebrate { 
            animation: pulseSuccess 0.65s cubic-bezier(0.34, 1.56, 0.64, 1); 
            z-index: 20;
        }

        /* ========================================
           LIGHT THEME OVERRIDES
        ======================================== */
        [data-theme="light"] {
            --bg:       #e0e0e0;
            --text:     #1a1a1a;
            --inactive: #888888;
            --grid-line:#CCCCCC;
            --highlight:#007AFF;
        }
        [data-theme="light"] .cell.given { 
            color: #111; 
            background: #d2d2d2 !important; /* Solid light gray instead of semi-transparent */
        }
        [data-theme="light"] body {
            background-image: 
                linear-gradient(rgba(0, 74, 153, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 74, 153, 0.15) 1px, transparent 1px) !important;
            background-size: 10px 10px;
        }      [data-theme="light"] .cell:hover { background: rgba(0,0,0,0.05); }
        [data-theme="light"] .cell { background: var(--bg); }

        /* ========================================
           ERROR MESSAGE
        ======================================== */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(200, 30, 30, 0.9);
            color: white;
            padding: 16px 36px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            z-index: 9999;
            animation: fadeOut 2s ease-in-out forwards;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0%  { opacity: 1; }
            70% { opacity: 1; }
            100%{ opacity: 0; }
        }

        /* ========================================
           VICTORY OVERLAY
        ======================================== */
        #victoryOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        #victoryOverlay.visible { display: flex; }

        .victory-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            padding: clamp(32px, 6vh, 64px) clamp(24px, 5vw, 48px);
            border-radius: clamp(24px, 5vw, 40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            text-align: center;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: victoryPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }
        @keyframes victoryPop {
            0% { transform: scale(0.85) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .victory-reaction {
            font-size: 14px;
            font-weight: 700;
            color: var(--highlight);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .hero-time {
            font-size: clamp(48px, 15vw, 84px);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.01em;
            line-height: 1;
            margin-bottom: 24px;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
            font-variant-numeric: tabular-nums;
        }

        .best-performance {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-bottom: 40px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .best-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--highlight);
            opacity: 0.6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .best-value-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .best-time-val {
            font-size: 20px;
            font-weight: 400;
            color: var(--text);
        }

        .best-diff {
            font-size: 16px;
            font-weight: 600;
        }
        .best-diff.better { color: #4cd964; }
        .best-diff.worse { color: #ff3b30; }

        .primary-btn {
            background: var(--highlight);
            color: #000;
            border: none;
            padding: 18px 48px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .primary-btn:active { transform: scale(0.96); }
        .timer-display {
            color: var(--highlight);
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--glow);
            font-variant-numeric: tabular-nums;
        }

        .record-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-left: 12px;
            opacity: 0.6;
        }

        .record-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text);
            text-transform: uppercase;
        }

        .record-value {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            font-family: inherit;
        }.victory-btn {
            background: var(--highlight);
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 8px;
        }

        /* ========================================
           MOBILE — stack tighter
        ======================================== */
        @media (max-width: 480px) {
            .header-bar { height: 52px; padding: 12px 16px 0; }
            .difficulty-selector { gap: 24px; height: 44px; margin-top: 8px; }
            .input-number-bar { height: 44px; padding: 0 8px; }
            .num-btn { font-size: 18px; }
            .grid-area { padding: 8px 8px 12px; }
        }

        /* ========================================
           TOUCH KEYPAD (HOLD & SLIDE)
        ======================================== */
        .touch-keypad {
            position: fixed;
            z-index: 10000;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 16px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 30px rgba(87, 199, 255, 0.2);
            transform: scale(0.9) translateY(10px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-keypad.visible {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .keypad-btn {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: all 0.15s ease;
            position: relative;
        }
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            min-height: 64px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            z-index: 100;
            width: 100%;
            box-sizing: border-box;
        }
        
        .header-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .header-center {
            flex: 0 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            z-index: 10;
        }

        .header-center > * {
            pointer-events: auto;
        }

        .header-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .header-bar button {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .header-bar button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .header-bar button svg {
            width: 16px;
            height: 16px;
        }

        #timer_display {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--highlight);
            letter-spacing: 1px;
            min-width: 90px;
            text-align: center;
            line-height:  1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #timer_display.paused {
            color: #ff9500; /* Vibrant amber/orange highlight when paused */
            text-shadow: 0 0 20px rgba(255, 149, 0, 0.5);
            opacity: 0.9;
        }

        .oscillating {
            animation: oscillate 1.4s ease-in-out infinite;
            background: rgba(255, 255, 255, 0.25) !important;
            border-color: var(--highlight) !important;
            box-shadow: 0 0 15px var(--glow);
        }

        @keyframes oscillate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .version-tag {
            position: fixed;
            bottom: 12px;
            right: 16px;
            font-size: 10px;
            color: var(--inactive);
            opacity: 0.4;
            font-family: var(--font);
            pointer-events: none;
            z-index: 1000;
            letter-spacing: 0.1em;
        }
        .keypad-btn.active {
            background: var(--highlight);
            color: #000;
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--glow);
            font-weight: 600;
            z-index: 10;
        }
        .keypad-btn.backspace {
            grid-column: span 3;
            width: auto;
            height: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.15em;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 6px;
            text-transform: uppercase;
        }
        .keypad-btn.backspace.active {
            background: var(--highlight);
            color: #000;
            box-shadow: 0 0 25px var(--glow);
            transform: scale(1.05);
        }

        /* Visual 'Tick' for keypad selection */
        @keyframes visual-tick {
            0% { transform: scale(1.15); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1.15); }
        }
        .keypad-btn.active.tick {
            animation: visual-tick 0.1s ease-out;
        }

        /* Light Mode Overrides for Touch Keypad */
        [data-theme="light"] .touch-keypad {
            background: rgba(250, 250, 250, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15), 0 0 20px rgba(0, 122, 255, 0.1);
        }
        [data-theme="light"] .keypad-btn {
            background: rgba(0, 0, 0, 0.05);
            color: #222;
        }
        [data-theme="light"] .keypad-btn.backspace {
            background: rgba(255, 60, 60, 0.05);
            color: #d32f2f;
        }
        [data-theme="light"] .header-bar button {

        /* ========================================

        ======================================== */
        .update-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(87, 199, 255, 0.1);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            min-width: 280px;
            pointer-events: all;
        }

        .update-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .update-toast-text {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .update-refresh-btn {
            background: var(--highlight);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 0 10px var(--highlight);
        }

        .update-refresh-btn:active {
            transform: scale(0.95);
        }

        /* Adjustments for safe area */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .update-toast {
                bottom: calc(30px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

    <script src="script.js?v=152"></script>
<script>
    /* =============================================
       BRIDGE — connects new UI to existing SudokuGame
    ============================================= */

    let isInitialized = false;

    /* ---- Timer display ---- */
    function updateTimerDisplay(timeStr) {
        const el = document.getElementById('game-timer');
        if (!el || !timeStr) return;
        
        // Convert 00:00:00 to 00:00 if hours are zero
        let parts = timeStr.split(':');
        if (parts.length === 3 && parts[0] === '00') {
            el.textContent = parts[1] + ':' + parts[2];
        } else {
            el.textContent = timeStr;
        }
    }

    /* ---- Theme toggle ---- */
    function toggleTheme() {
        const html = document.documentElement;
        const isLight = html.getAttribute('data-theme') === 'light';
        html.setAttribute('data-theme', isLight ? '' : 'light');
    }

    /* ---- Difficulty Cycling ---- */
    // Handled by global cycleDifficulty() in script.js

    /* ---- Number selection (Horizontal Pad) ---- */
    function selectNumber(n, event) {
        if (event) event.stopPropagation();
        if (!window.game) return;

        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
        if (selectedPadNumber === n) {
            selectedPadNumber = null;
            window.game.isPaintMode = false;
            window.game.paintNumber = null;
            window.game.clearHighlights();
            window.game.clearNoteHighlights();
            return;
        }
        selectedPadNumber = n;
        const btns = document.querySelectorAll('.num-btn');
        if (btns[n - 1]) btns[n - 1].classList.add('selected');

        window.game.isPaintMode = true;
        window.game.paintNumber = n;
        window.game.clearHighlights();
        window.game.clearNoteHighlights();
        window.game.highlightAllInstances(n);
        window.game.setNumberCursor(n);
    }

    /* ---- Hint ---- */
    function solveHint() {
        if (window.game) window.game.solveHint();
    }

    /* ---- Stubs & UI Utils ---- */
    function undoMove()     { if (window.game) window.game.undoMove?.(); }
    function redoMove()     { if (window.game) window.game.redoMove?.(); }
    function pauseTimer()   { if (window.game) window.game.pauseTimer(); }
    function resumeTimer()  { if (window.game) window.game.resumeTimer(); }
    function resetBestTime(){ if (window.game) window.game.resetBestTime(); }
    function newGame()      { if (window.game) window.game.newGame(); }

    /* Sync num-btn completed class */
    function syncNumBtnStates() {
        if (!window.game) return;
        const btns = document.querySelectorAll('.num-btn');
        for (let n = 1; n <= 9; n++) {
            const count = window.game.grid.flat().filter(v => v === n).length;
            if (btns[n-1]) btns[n-1].classList.toggle('completed', count >= 9);
        }
    }

    /* ---- MutationObserver: sync hidden #timer (from script.js) → #timer_display ---- */
    function setupTimerObserver() {
        const timerEl = document.getElementById('timer');
        if (!timerEl) return;
        const obs = new MutationObserver(() => {
            updateTimerDisplay(timerEl.textContent);
            syncNumBtnStates();
        });
        obs.observe(timerEl, { childList: true, characterData: true, subtree: true });
    }

    /* ---- Hook SudokuGame methods for custom UI ---- */
    function patchGame(game) {
        /* Hook updateProgress to update our horizontal bar */
        const origUpdateProgress = game.updateProgress?.bind(game);
        if (origUpdateProgress) {
            game.updateProgress = function() {
                origUpdateProgress();
                syncNumBtnStates();
            };
        }

        /* Hook gameWon for victory overlay */
        const origGameWon = game.gameWon?.bind(game);
        if (origGameWon) {
            game.gameWon = function() {
                const currentTime = game.getElapsedTime();
                const diffLabel = game.difficulty.toLowerCase();
                const previousBest = game.bestTimes[diffLabel];
                
                // Helper to strip leading 00: from time strings
                const shortenTime = (t) => {
                    if (!t) return '--:--';
                    let parts = t.split(':');
                    if (parts.length === 3 && (parts[0] === '00' || parts[0] === '0')) {
                        return parts[1] + ':' + parts[2];
                    }
                    return t;
                };

                // Allow original gameWon to run (updates best time if needed)
                origGameWon();

                const overlay = document.getElementById('victoryOverlay');
                if (overlay) {
                    const timeEl = document.getElementById('game-timer');
                    const heroTime = document.getElementById('victoryTime');
                    const bestValEl = document.getElementById('bestTimeVal');
                    const bestDiffEl = document.getElementById('bestTimeDiff');
                    
                    if (heroTime && timeEl) {
                        heroTime.textContent = shortenTime(timeEl.textContent);
                    }

                    if (bestValEl && bestDiffEl) {
                        const currentBest = game.bestTimes[diffLabel];
                        bestValEl.textContent = shortenTime(game.formatTime(currentBest));
                        
                        if (!previousBest || currentTime < previousBest) {
                            bestDiffEl.textContent = 'NEW RECORD!';
                            bestDiffEl.className = 'best-diff better';
                        } else {
                            const diff = currentTime - previousBest;
                            if (diff === 0) {
                                bestDiffEl.textContent = 'MATCHED BEST';
                                bestDiffEl.className = 'best-diff';
                            } else {
                                let sign = diff > 0 ? '+' : '';
                                bestDiffEl.textContent = sign + shortenTime(game.formatTime(Math.abs(diff)));
                                bestDiffEl.className = 'best-diff worse';
                            }
                        }
                    }
                    
                    overlay.classList.add('visible');
                }
            };
        }

        /* Hook highlight synchronization for the pad */
        game.onHighlightChange = function(n) {
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            if (n !== null && n > 0) {
                const btns = document.querySelectorAll('.num-btn');
                if (btns[n - 1]) btns[n - 1].classList.add('selected');
                selectedPadNumber = n; // Keep internal toggle variable in sync
            } else {
                selectedPadNumber = null;
            }
        };
    }

    /* ---- Init ---- */
    function initializeApp() {
        if (isInitialized) return;
        isInitialized = true;
        try {
            window.game = new SudokuGame();
            patchGame(window.game);
            setupTimerObserver();
            syncNumBtnStates();
            
            // Initial UI sync
            const diffLabel = document.getElementById('difficulty_toggle_label');
            if (diffLabel && window.game) {
                diffLabel.textContent = window.game.difficulty.toUpperCase();
            }
        } catch(e) {
            console.error('❌ Game initialization error:', e);
        }
    }

    window.addEventListener('load', initializeApp);
    window.addEventListener('beforeunload', () => {
        if (window.game) {
            if (window.game.autoSaveInterval) clearInterval(window.game.autoSaveInterval);
            if (window.game.timer) clearInterval(window.game.timer);
            window.game = null;
        }
    });
</script>

    <script>
        // --- Premium PWA Update Notification System ---
        function showUpdateToast(reg) {
            const container = document.getElementById('update-toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = 'update-toast';
            toast.innerHTML = `
                <div class="update-toast-text">New version available!</div>
                <button class="update-refresh-btn" id="refresh-pwa-btn">REFRESH</button>
            `;

            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 100);

            document.getElementById('refresh-pwa-btn').addEventListener('click', () => {
                // If there's a waiting worker, skipWaiting was already called in sw.js
                // but we reload to get the new assets and updated UI version tags
                window.location.reload();
            });
        }

        // Register Service Worker for offline support and updates
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker registered');
                        
                        // 1. Check for updates IMMEDIATELY on launch
                        reg.update();

                        // 2. Periodic periodic check every 1 hour (3600000ms)
                        setInterval(() => {
                            console.log('🔍 Checking for PWA updates...');
                            reg.update();
                        }, 3600000);

                        // 3. Listen for the actual update being found and installed
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                // Once the new worker is installed, it becomes the 'waiting' worker
                                // In our sw.js, we call skipWaiting() so it activates quickly
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🚀 New version detected and ready.');
                                    showUpdateToast(reg);
                                }
                            });
                        });
                    })
                    .catch(err => console.error('❌ Service Worker registration failed:', err));
            });
        }
    </script>
